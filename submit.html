<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .thankyou-box{
      background: white;
      padding: 50px 40px;
      border-radius: 15px;
      text-align: center;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .check-icon{
      font-size: 70px;
      color: #28a745;
      margin-bottom: 20px;
    }

    h1{
      color: #333;
      margin-bottom: 15px;
    }

    p{
      color: #666;
      font-size: 16px;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .home-btn{
      display: inline-block;
      padding: 12px 25px;
      background: #2a5298;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .home-btn:hover{
      background: #1e3c72;
    }
  </style>
</head>

<body>

  <div class="thankyou-box">
    <div class="check-icon">✔</div>

    <h1>Thank You!</h1>

    <p>
      Your feedback has been submitted successfully.
      I will get back to you soon.
    </p>

    <a href="index.html" class="home-btn">
      Back to Home
    </a>
  </div>

</body>
</html>
